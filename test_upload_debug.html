<!DOCTYPE html>
<html>
<head>
    <title>Debug Profile Image Upload</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .result { margin: 10px 0; padding: 10px; border-radius: 5px; }
        .success { background-color: #d4edda; color: #155724; }
        .error { background-color: #f8d7da; color: #721c24; }
        .info { background-color: #d1ecf1; color: #0c5460; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        input { margin: 10px 0; }
    </style>
</head>
<body>
    <h1>Profile Image Upload Debug</h1>
    
    <div>
        <label>Auth Token:</label>
        <input type="text" id="authToken" placeholder="Enter your JWT token" style="width: 400px;">
        <br>
        <label>Image File:</label>
        <input type="file" id="imageFile" accept="image/*">
        <br>
        <button onclick="testUpload()">Test Upload</button>
        <button onclick="testWithoutAuth()">Test Without Auth</button>
    </div>
    
    <div id="results"></div>

    <script>
        function addResult(message, type = 'info') {
            const results = document.getElementById('results');
            const div = document.createElement('div');
            div.className = `result ${type}`;
            div.innerHTML = message;
            results.appendChild(div);
        }

        async function testWithoutAuth() {
            addResult('Testing upload endpoint without auth...', 'info');
            try {
                const response = await fetch('https://medi-express-zvo4.vercel.app/api/upload/profile-image', {
                    method: 'POST'
                });
                
                const text = await response.text();
                
                if (response.status === 401) {
                    addResult('✅ Endpoint exists (401 Unauthorized as expected)', 'success');
                } else if (response.status === 404) {
                    addResult('❌ Endpoint not found (404)', 'error');
                } else {
                    addResult(`Response: ${response.status} - ${text}`, 'info');
                }
            } catch (error) {
                addResult(`❌ Error: ${error.message}`, 'error');
            }
        }

        async function testUpload() {
            const token = document.getElementById('authToken').value;
            const fileInput = document.getElementById('imageFile');
            
            if (!token) {
                addResult('❌ Please enter auth token', 'error');
                return;
            }
            
            if (!fileInput.files[0]) {
                addResult('❌ Please select an image file', 'error');
                return;
            }

            addResult('🔄 Testing upload with auth token...', 'info');
            
            try {
                const formData = new FormData();
                formData.append('image', fileInput.files[0]);

                const response = await fetch('https://medi-express-zvo4.vercel.app/api/upload/profile-image', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    },
                    body: formData
                });

                const responseText = await response.text();
                
                addResult(`Status: ${response.status}`, 'info');
                addResult(`Response: ${responseText}`, response.ok ? 'success' : 'error');
                
                if (response.ok) {
                    const data = JSON.parse(responseText);
                    if (data.data && data.data.imageUrl) {
                        addResult(`✅ Upload successful! Image URL: ${data.data.imageUrl}`, 'success');
                    }
                }
            } catch (error) {
                addResult(`❌ Upload error: ${error.message}`, 'error');
            }
        }

        // Auto-test endpoint on load
        window.onload = function() {
            testWithoutAuth();
        };
    </script>
</body>
</html>
